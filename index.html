<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SOUS — On-Demand Orders (MVP)</title>
  <style>
    :root {
      --color-primary: #0D1B3E;
      --color-text: #111111;
      --color-muted: #6B7280;
      --color-border: #E5E7EB;
      --color-bg: #F9FAFB;
      --color-white: #FFFFFF;

      /* Status colours — cards and badges are coloured by delivery status, not by type */
      --status-open-bg:       #FEF3C7; --status-open-text:       #92400E; --status-open-accent:       #F59E0B;
      --status-preparing-bg:  #DBEAFE; --status-preparing-text:  #1E40AF; --status-preparing-accent:  #3B82F6;
      --status-ready-bg:      #D1FAE5; --status-ready-text:      #065F46; --status-ready-accent:      #10B981;
      --status-en-route-bg:   #EDE9FE; --status-en-route-text:   #5B21B6; --status-en-route-accent:   #7C3AED;
      --status-delivered-bg:  #ECFDF5; --status-delivered-text:  #047857; --status-delivered-accent:  #059669;
      --status-fulfilled-bg:  #F3F4F6; --status-fulfilled-text:  #6B7280; --status-fulfilled-accent:  #9CA3AF;

      /* Address panel */
      --color-address-bg: #FEF9C3;
      --color-address-border: #FDE047;

      --radius-card: 10px;
      --radius-badge: 4px;
      --font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font-family);
      background: var(--color-bg);
      color: var(--color-text);
      min-height: 100vh;
    }

    /* ── Kanban board layout ── */

    .dashboard {
      max-width: 1300px;
      margin: 0 auto;
      padding: 24px 20px;
    }

    .dashboard-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 24px;
    }

    .dashboard-header h1 {
      font-size: 22px;
      font-weight: 700;
      color: var(--color-text);
    }

    .date-badge {
      font-size: 13px;
      color: var(--color-muted);
      background: var(--color-white);
      border: 1px solid var(--color-border);
      border-radius: 6px;
      padding: 3px 10px;
    }

    .kanban {
      display: flex;
      gap: 12px;
      overflow-x: auto;
      padding-bottom: 12px;
      align-items: flex-start;
    }

    .kanban-column {
      min-width: 210px;
      flex: 1;
      background: var(--color-bg);
      border-radius: var(--radius-card);
      padding: 12px;
    }

    .col-header {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 10px;
    }

    .col-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .dot-open      { background: var(--status-open-accent); }
    .dot-preparing { background: var(--status-preparing-accent); }
    .dot-ready     { background: var(--status-ready-accent); }
    .dot-fulfilled { background: var(--status-fulfilled-accent); }
    .dot-red       { background: #EF4444; }

    .col-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--color-text);
      flex: 1;
    }

    .col-count {
      font-size: 12px;
      color: var(--color-muted);
      background: var(--color-white);
      border: 1px solid var(--color-border);
      border-radius: 10px;
      padding: 1px 7px;
    }

    .col-cards {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .no-orders {
      font-size: 12px;
      color: var(--color-muted);
      text-align: center;
      padding: 20px 0;
    }

    /* ── Order cards — coloured by delivery status ── */

    .order-card {
      background: var(--color-white);
      border: 1px solid var(--color-border);
      border-left-width: 4px;
      border-radius: var(--radius-card);
      padding: 12px;
      cursor: pointer;
      transition: box-shadow 0.15s;
    }

    .order-card:hover {
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    /* Left accent border by status */
    .card-open      { border-left-color: var(--status-open-accent); }
    .card-preparing { border-left-color: var(--status-preparing-accent); }
    .card-ready     { border-left-color: var(--status-ready-accent); }
    .card-en-route  { border-left-color: var(--status-en-route-accent); }
    .card-delivered { border-left-color: var(--status-delivered-accent); }
    .card-fulfilled { border-left-color: var(--status-fulfilled-accent); }

    .order-badge {
      display: inline-block;
      font-size: 11px;
      font-weight: 500;
      border-radius: var(--radius-badge);
      padding: 2px 7px;
      margin-bottom: 7px;
    }

    /* Badge colours by status */
    .badge-open      { background: var(--status-open-bg);      color: var(--status-open-text); }
    .badge-preparing { background: var(--status-preparing-bg); color: var(--status-preparing-text); }
    .badge-ready     { background: var(--status-ready-bg);     color: var(--status-ready-text); }
    .badge-en-route  { background: var(--status-en-route-bg);  color: var(--status-en-route-text); }
    .badge-delivered { background: var(--status-delivered-bg); color: var(--status-delivered-text); }
    .badge-fulfilled { background: var(--status-fulfilled-bg); color: var(--status-fulfilled-text); }

    .order-card .customer-name {
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 2px;
    }

    .order-card .order-meta {
      font-size: 12px;
      color: var(--color-muted);
      margin-bottom: 8px;
    }

    .card-status-pill {
      font-size: 11px;
      font-weight: 500;
      border-radius: var(--radius-badge);
      padding: 3px 8px;
      margin-top: 4px;
      display: inline-block;
    }

    .card-start-prep {
      background: var(--color-primary);
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 6px 0;
      width: 100%;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 6px;
    }

    /* ── Modal ── */

    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.4);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }

    .modal-overlay.open {
      display: flex;
    }

    .modal {
      background: var(--color-white);
      border-radius: 14px;
      padding: 24px;
      width: 100%;
      max-width: 480px;
      max-height: 90vh;
      overflow-y: auto;
      position: relative;
    }

    .modal-close {
      position: absolute;
      top: 14px;
      right: 16px;
      background: none;
      border: none;
      font-size: 22px;
      color: var(--color-muted);
      cursor: pointer;
      line-height: 1;
    }

    .modal-header { margin-bottom: 10px; }

    .modal-time {
      font-size: 28px;
      font-weight: 700;
    }

    .modal-date {
      font-size: 13px;
      color: var(--color-muted);
      margin-bottom: 12px;
    }

    .modal-customer {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .modal-badge-wrap { margin-bottom: 16px; }

    .modal-courier-panel {
      border-radius: 8px;
      padding: 10px 14px;
      margin-bottom: 14px;
    }

    .courier-panel-title {
      font-size: 14px;
      font-weight: 600;
    }

    .courier-panel-sub {
      font-size: 13px;
    }

    .modal-items {
      border: 1px solid var(--color-border);
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 14px;
      font-size: 13px;
    }

    .modal-items .item-row {
      display: flex;
      justify-content: space-between;
      padding: 3px 0;
    }

    .modal-items .item-total {
      display: flex;
      justify-content: space-between;
      font-weight: 700;
      border-top: 1px solid var(--color-border);
      margin-top: 6px;
      padding-top: 6px;
    }

    .modal-address {
      background: var(--color-address-bg);
      border: 1px solid var(--color-address-border);
      border-radius: 8px;
      padding: 10px 14px;
      margin-bottom: 14px;
      font-size: 13px;
    }

    .address-label {
      font-weight: 600;
      margin-bottom: 3px;
    }

    .address-value { color: var(--color-muted); }

    .modal-customer-info {
      border: 1px solid var(--color-border);
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 16px;
      font-size: 13px;
    }

    .modal-customer-info .info-label {
      font-size: 11px;
      color: var(--color-muted);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .modal-customer-info .info-row {
      padding: 2px 0;
      color: var(--color-text);
    }

    .modal-customer-info .info-row span {
      color: var(--color-muted);
      margin-right: 6px;
    }

    .modal-cta {
      width: 100%;
      background: var(--color-primary);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 14px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
    }

    .modal-cta:hover { opacity: 0.9; }
  </style>
</head>
<body>

  <div class="dashboard">
    <header class="dashboard-header">
      <h1>On-Demand Orders</h1>
      <span class="date-badge">14 Mar 2026</span>
    </header>

    <div class="kanban">
      <div class="kanban-column" id="col-open">
        <div class="col-header">
          <span class="col-dot dot-open"></span>
          <span class="col-title">Open</span>
          <span class="col-count" id="count-open">0</span>
        </div>
        <div class="col-cards" id="cards-open"></div>
      </div>

      <div class="kanban-column" id="col-preparing">
        <div class="col-header">
          <span class="col-dot dot-preparing"></span>
          <span class="col-title">Preparing</span>
          <span class="col-count" id="count-preparing">0</span>
        </div>
        <div class="col-cards" id="cards-preparing"></div>
      </div>

      <div class="kanban-column" id="col-ready">
        <div class="col-header">
          <span class="col-dot dot-ready"></span>
          <span class="col-title">Ready</span>
          <span class="col-count" id="count-ready">0</span>
        </div>
        <div class="col-cards" id="cards-ready"></div>
      </div>

      <div class="kanban-column" id="col-fulfilled">
        <div class="col-header">
          <span class="col-dot dot-fulfilled"></span>
          <span class="col-title">Fulfilled</span>
          <span class="col-count" id="count-fulfilled">0</span>
        </div>
        <div class="col-cards" id="cards-fulfilled"></div>
      </div>

      <!-- Cancelled column: static by design — no orders enter this state in the prototype -->
      <div class="kanban-column" id="col-cancelled">
        <div class="col-header">
          <span class="col-dot dot-red"></span>
          <span class="col-title">Cancelled</span>
          <span class="col-count" id="count-cancelled">0</span>
        </div>
        <div class="col-cards" id="cards-cancelled"></div>
      </div>
    </div>
  </div>

  <!-- Modal -->
  <div class="modal-overlay" id="modal-overlay" onclick="closeModal()">
    <div class="modal" onclick="event.stopPropagation()">
      <button class="modal-close" onclick="closeModal()">×</button>

      <div class="modal-header">
        <div class="modal-time" id="modal-time"></div>
        <div class="modal-date" id="modal-date"></div>
      </div>

      <div class="modal-customer" id="modal-customer"></div>
      <div class="modal-badge-wrap">
        <span class="order-badge" id="modal-badge"></span>
      </div>

      <!-- Courier panel: shown for uber in ready/en_route/delivered states -->
      <div class="modal-courier-panel" id="modal-courier-panel" style="display:none">
        <div class="courier-panel-title" id="modal-courier-title"></div>
        <div class="courier-panel-sub" id="modal-courier-sub"></div>
      </div>

      <div class="modal-items" id="modal-items"></div>

      <!-- Delivery address — Uber Direct only, always visible -->
      <div class="modal-address" id="modal-address" style="display:none">
        <div class="address-label">📍 Delivery Address</div>
        <div class="address-value" id="modal-address-value"></div>
      </div>

      <div class="modal-customer-info" id="modal-customer-info"></div>

      <button class="modal-cta" id="modal-cta"></button>
    </div>
  </div>

  <script>
    // ── Seed data ──

    const ORDERS = {
      // Open
      pickup1: {
        id: 'pickup1', type: 'pickup', time: '18:00', date: 'Saturday, 14 March 2026',
        customer: 'Thijs Visscher', email: 'tlvisscher@gmail.com', phone: '+31683645692',
        items: [

        ],

      },
      uber1: {
        id: 'uber1', type: 'uber', time: '18:30', date: 'Saturday, 14 March 2026',
        customer: 'Sharon Koopman', email: 'sharon@gmail.com', phone: '+31612345678',
        items: [
          { name: 'Jerusalem Plate Chicken', price: '€48.00' },
          { name: 'NENIs Hummus', price: '€12.00' },

          { name: 'Fried Chicken', price: '€16.00' },
          { name: 'Tahina', price: '€8.00' },
          { name: "4 Pita's", price: '€7.00' },
          { name: "2 Pita's", price: '€4.00' },
        ],
        total: '€121.00', address: 'Keizersgracht 123, Amsterdam',
        courier: { name: 'John D.', eta: '~18:42' }, state: 'open',
      },

      // Preparing
      pickup2: {
        id: 'pickup2', type: 'pickup', time: '18:15', date: 'Saturday, 14 March 2026',
        customer: 'Lars Bakker', email: 'lars.bakker@gmail.com', phone: '+31620112233',
        items: [
          { name: 'Shakshuka', price: '€14.00' },
          { name: 'Pita Bread', price: '€4.00' },
          { name: 'Lemonade', price: '€5.00' },
        ],
        total: '€23.00', state: 'preparing',
      },
      uber2: {
        id: 'uber2', type: 'uber', time: '18:45', date: 'Saturday, 14 March 2026',
        customer: 'Nina de Vries', email: 'nina.devries@gmail.com', phone: '+31655443322',
        items: [
          { name: 'Falafel Plate', price: '€18.00' },
          { name: 'Hummus Bowl', price: '€12.00' },
          { name: 'Sparkling Water', price: '€4.00' },
        ],
        total: '€34.00', address: 'Prinsengracht 456, Amsterdam',
        courier: { name: 'Maria S.', eta: '~19:02' }, state: 'preparing',
      },

      // Ready / Awaiting Courier
      pickup3: {
        id: 'pickup3', type: 'pickup', time: '17:45', date: 'Saturday, 14 March 2026',
        customer: 'Fatima El-Amin', email: 'fatima.elamin@gmail.com', phone: '+31677889900',
        items: [
          { name: 'Mezze Platter', price: '€22.00' },
          { name: 'Baklava', price: '€8.00' },
        ],
        total: '€30.00', state: 'ready',
      },
      uber3: {
        id: 'uber3', type: 'uber', time: '18:00', date: 'Saturday, 14 March 2026',
        customer: 'Joost van Dam', email: 'joost.vandam@gmail.com', phone: '+31611223344',
        items: [
          { name: 'Chicken Wrap', price: '€14.00' },
          { name: 'Sweet Potato Fries', price: '€7.00' },
          { name: 'Mint Tea', price: '€4.00' },
        ],
        total: '€25.00', address: 'Herengracht 789, Amsterdam',
        courier: { name: 'Ahmed K.', eta: '~18:14' }, state: 'ready',
      },

      // Fulfilled — pickup collected, uber en route, uber delivered
      pickup4: {
        id: 'pickup4', type: 'pickup', time: '17:00', date: 'Saturday, 14 March 2026',
        customer: 'Emma Janssen', email: 'emma.janssen@gmail.com', phone: '+31644556677',
        items: [
          { name: 'Veggie Bowl', price: '€16.00' },
          { name: 'Fresh Juice', price: '€6.00' },
        ],
        total: '€22.00', state: 'fulfilled',
      },
      uber4: {
        id: 'uber4', type: 'uber', time: '17:30', date: 'Saturday, 14 March 2026',
        customer: 'Pieter Smit', email: 'pieter.smit@gmail.com', phone: '+31633445566',
        items: [
          { name: 'Lamb Kofta', price: '€20.00' },
          { name: 'Rice Pilaf', price: '€8.00' },
          { name: 'Ayran', price: '€4.00' },
        ],
        total: '€32.00', address: 'Leidsegracht 22, Amsterdam',
        courier: { name: 'Yusuf B.', eta: '~17:48', deliveryEta: '~17:58' }, state: 'en_route',
      },
      uber5: {
        id: 'uber5', type: 'uber', time: '16:30', date: 'Saturday, 14 March 2026',
        customer: 'Aisha Osei', email: 'aisha.osei@gmail.com', phone: '+31622334455',
        items: [
          { name: 'Sabich Sandwich', price: '€13.00' },
          { name: 'Israeli Salad', price: '€9.00' },
          { name: 'Still Water', price: '€3.00' },
        ],
        total: '€25.00', address: 'Vondelstraat 11, Amsterdam',
        courier: { name: 'Luca M.', eta: '~16:52' }, state: 'delivered',
      },
    };

    // ── Status config: label, badge class, card class, per order type ──

    const STATUS_CONFIG = {
      open:      { label: 'Open',             badgeClass: 'badge-open',      cardClass: 'card-open' },
      preparing: { label: 'Preparing',        badgeClass: 'badge-preparing', cardClass: 'card-preparing' },
      ready:     { label: 'Ready',            badgeClass: 'badge-ready',     cardClass: 'card-ready' },
      en_route:  { label: 'En Route',         badgeClass: 'badge-en-route',  cardClass: 'card-en-route' },
      delivered: { label: 'Delivered',        badgeClass: 'badge-delivered', cardClass: 'card-delivered' },
      fulfilled: { label: 'Fulfilled',        badgeClass: 'badge-fulfilled', cardClass: 'card-fulfilled' },
    };

    // Uber Direct overrides the "ready" label
    function statusLabel(order) {
      if (order.state === 'ready' && order.type === 'uber') return 'Awaiting Courier';
      return STATUS_CONFIG[order.state].label;
    }

    function badgeLabel(order) {
      const icon = order.type === 'uber' ? '🚴' : '🧍';
      const typeLabel = order.type === 'uber' ? 'Uber Direct' : 'On-demand pickup';
      return `${icon} ${typeLabel} · ${statusLabel(order)}`;
    }

    // Column each state maps to in the kanban
    const STATE_TO_COLUMN = {
      open: 'open', preparing: 'preparing', ready: 'ready',
      en_route: 'fulfilled', delivered: 'fulfilled', fulfilled: 'fulfilled',
    };

    // ── Card renderer ──

    // NOTE: innerHTML is safe here because all data is static seed data.
    // If connected to live API data, all interpolated fields must be sanitised first.
    function renderCard(order) {
      const cfg = STATUS_CONFIG[order.state];
      const card = document.createElement('div');
      card.className = `order-card ${cfg.cardClass}`;
      card.id = `card-${order.id}`;
      card.onclick = () => openModal(order.id);

      // Courier pill: shown on card for uber in en_route/delivered states
      let courierPill = '';
      if (order.type === 'uber' && order.state === 'ready') {
        courierPill = `<div class="card-status-pill badge-ready">🛵 ${order.courier.name} · ${order.courier.eta}</div>`;
      } else if (order.type === 'uber' && order.state === 'en_route') {
        const deliveryEta = order.courier.deliveryEta || order.courier.eta;
        courierPill = `<div class="card-status-pill badge-en-route">🛵 En Route · Delivery ${deliveryEta}</div>`;
      } else if (order.type === 'uber' && order.state === 'delivered') {
        courierPill = `<div class="card-status-pill badge-delivered">✅ Delivered · ${order.courier.name}</div>`;
      }

      const startPrepBtn = order.state === 'open'
        ? `<button class="card-start-prep" onclick="event.stopPropagation();advanceState('${order.id}')">Start Prep</button>`
        : '';

      card.innerHTML = `
        <span class="order-badge ${cfg.badgeClass}">${badgeLabel(order)}</span>
        <div class="customer-name">${order.customer}</div>
        <div class="order-meta">${order.time} · ${order.total}</div>
        ${courierPill}
        ${startPrepBtn}
      `;
      return card;
    }

    function renderAllCards() {
      ['open','preparing','ready','fulfilled','cancelled'].forEach(col => {
        document.getElementById(`cards-${col}`).innerHTML = '';
      });

      Object.values(ORDERS).forEach(order => {
        const col = STATE_TO_COLUMN[order.state] || order.state;
        document.getElementById(`cards-${col}`).appendChild(renderCard(order));
      });

      ['open','preparing','ready','fulfilled','cancelled'].forEach(col => {
        const count = document.getElementById(`cards-${col}`).children.length;
        document.getElementById(`count-${col}`).textContent = count;
        if (count === 0) {
          document.getElementById(`cards-${col}`).innerHTML = '<p class="no-orders">No orders</p>';
        }
      });
    }

    renderAllCards();

    // ── State machine ──

    const STATE_SEQUENCES = {
      pickup: ['open', 'preparing', 'ready', 'fulfilled'],
      uber:   ['open', 'preparing', 'ready', 'en_route', 'delivered'],
    };

    const CTA_LABELS = {
      open:      'Mark as Preparing',
      preparing: 'Mark as Ready',
      ready:     { pickup: 'Mark as Fulfilled', uber: 'Hand to Courier' },
      en_route:  'Mark as Delivered',
    };

    function ctaLabel(order) {
      const label = CTA_LABELS[order.state];
      if (typeof label === 'object') return label[order.type];
      return label;
    }

    const TERMINAL_STATES = new Set(['fulfilled', 'delivered']);

    function advanceState(orderId) {
      const order = ORDERS[orderId];
      const seq = STATE_SEQUENCES[order.type];
      const idx = seq.indexOf(order.state);
      if (idx !== -1 && idx < seq.length - 1) {
        order.state = seq[idx + 1];
      }
      renderAllCards();
      if (!TERMINAL_STATES.has(order.state)) {
        openModal(orderId);
      } else {
        closeModal();
      }
    }

    // ── Modal renderer ──

    function renderModal(orderId) {
      const order = ORDERS[orderId];
      const cfg = STATUS_CONFIG[order.state];

      document.getElementById('modal-time').textContent = order.time;
      document.getElementById('modal-date').textContent = order.date;
      document.getElementById('modal-customer').textContent = order.customer;

      const badge = document.getElementById('modal-badge');
      badge.textContent = badgeLabel(order);
      badge.className = `order-badge ${cfg.badgeClass}`;

      // Courier panel: content and style vary by state
      const courierPanel = document.getElementById('modal-courier-panel');
      if (order.type === 'uber' && order.courier) {
        const panelCfg = {
          ready:     { bg: 'var(--status-ready-bg)',     border: '#10B981', textColor: 'var(--status-ready-text)',     icon: '🛵', title: `Courier arriving ${order.courier.eta}`, sub: `${order.courier.name} · Uber Direct` },
          en_route:  { bg: 'var(--status-en-route-bg)',  border: '#7C3AED', textColor: 'var(--status-en-route-text)',  icon: '🛵', title: `En Route · ${order.courier.name}`,         sub: `Delivery ETA ${order.courier.deliveryEta || order.courier.eta}` },
          delivered: { bg: 'var(--status-delivered-bg)', border: '#059669', textColor: 'var(--status-delivered-text)', icon: '✅', title: `Delivered · ${order.courier.name}`,          sub: 'Order successfully delivered' },
        }[order.state];

        if (panelCfg) {
          courierPanel.style.cssText = `display:block;background:${panelCfg.bg};border:1px solid ${panelCfg.border};border-radius:8px;padding:10px 14px;margin-bottom:14px`;
          document.getElementById('modal-courier-title').style.color = panelCfg.textColor;
          document.getElementById('modal-courier-sub').style.color = panelCfg.textColor;
          document.getElementById('modal-courier-title').textContent = `${panelCfg.icon} ${panelCfg.title}`;
          document.getElementById('modal-courier-sub').textContent = panelCfg.sub;
        } else {
          courierPanel.style.display = 'none';
        }
      } else {
        courierPanel.style.display = 'none';
      }

      // Items table
      document.getElementById('modal-items').innerHTML =
        order.items.map(i => `<div class="item-row"><span>1× ${i.name}</span><span>${i.price}</span></div>`).join('') +
        `<div class="item-total"><span>Total</span><span>${order.total}</span></div>`;

      // Delivery address (Uber Direct only)
      const addrEl = document.getElementById('modal-address');
      if (order.type === 'uber') {
        document.getElementById('modal-address-value').textContent = order.address;
        addrEl.style.display = 'block';
      } else {
        addrEl.style.display = 'none';
      }

      // Customer info
      document.getElementById('modal-customer-info').innerHTML = `
        <div class="info-label">Customer Information</div>
        <div class="info-row"><span>👤</span>${order.customer}</div>
        <div class="info-row"><span>✉️</span>${order.email}</div>
        <div class="info-row"><span>📞</span>${order.phone}</div>
      `;

      // CTA
      const cta = document.getElementById('modal-cta');
      if (TERMINAL_STATES.has(order.state)) {
        cta.style.display = 'none';
      } else {
        cta.style.display = 'block';
        cta.textContent = ctaLabel(order);
        cta.onclick = () => advanceState(orderId);
      }
    }

    function openModal(orderId) {
      renderModal(orderId);
      document.getElementById('modal-overlay').classList.add('open');
    }

    function closeModal() {
      document.getElementById('modal-overlay').classList.remove('open');
    }
  </script>
</body>
</html>
